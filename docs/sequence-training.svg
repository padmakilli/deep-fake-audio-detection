<svg width="1080" height="720" viewBox="0 0 1080 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Training sequence diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F7F8FB"/><stop offset="100%" stop-color="#EDF0F5"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5B8DEF"/><stop offset="100%" stop-color="#3A6FD8"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F58A6B"/><stop offset="100%" stop-color="#E96A45"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3FC4A6"/><stop offset="100%" stop-color="#1FA98A"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7BE8"/><stop offset="100%" stop-color="#7C5AD6"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7DC95A"/><stop offset="100%" stop-color="#5CA93A"/></linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="200%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1b2233" flood-opacity="0.22"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#4a5160" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect x="0" y="0" width="1080" height="720" fill="url(#bg)"/>
  <text x="60" y="50" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2430">Training sequence — fit, validate, checkpoint</text>

  <!-- lifelines -->
  <line x1="150" y1="168" x2="150" y2="668" stroke="#b9c0cc" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="350" y1="168" x2="350" y2="668" stroke="#b9c0cc" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="550" y1="168" x2="550" y2="668" stroke="#b9c0cc" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="750" y1="168" x2="750" y2="668" stroke="#b9c0cc" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="950" y1="168" x2="950" y2="668" stroke="#b9c0cc" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- loop frame -->
  <rect x="120" y="232" width="700" height="248" rx="12" fill="none" stroke="#aeb6c4" stroke-width="1.4" stroke-dasharray="2 4"/>
  <path d="M120 244 v-12 h64 v6 l-8 6 z" fill="#6B7488"/>
  <text x="128" y="248" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#fff">loop</text>
  <text x="196" y="248" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12" fill="#6b7280">[per batch · per epoch]</text>

  <!-- participant boxes -->
  <rect x="68"  y="112" width="164" height="56" rx="16" fill="#2C57AE" filter="url(#softShadow)"/><rect x="68"  y="104" width="164" height="56" rx="16" fill="url(#g1)"/><text x="150" y="138" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">DataLoader</text>
  <rect x="268" y="112" width="164" height="56" rx="16" fill="#C2502F" filter="url(#softShadow)"/><rect x="268" y="104" width="164" height="56" rx="16" fill="url(#g2)"/><text x="350" y="138" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Feature extractor</text>
  <rect x="468" y="112" width="164" height="56" rx="16" fill="#14806A" filter="url(#softShadow)"/><rect x="468" y="104" width="164" height="56" rx="16" fill="url(#g3)"/><text x="550" y="138" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Model</text>
  <rect x="668" y="112" width="164" height="56" rx="16" fill="#5E40A8" filter="url(#softShadow)"/><rect x="668" y="104" width="164" height="56" rx="16" fill="url(#g4)"/><text x="750" y="138" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Loss + optimizer</text>
  <rect x="868" y="112" width="164" height="56" rx="16" fill="#44802A" filter="url(#softShadow)"/><rect x="868" y="104" width="164" height="56" rx="16" fill="url(#g5)"/><text x="950" y="138" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Evaluator</text>

  <!-- messages -->
  <text x="250" y="270" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Batch of waveforms + labels</text>
  <line x1="150" y1="280" x2="345" y2="280" stroke="#4a5160" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="450" y="312" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Log-mel features (+ SpecAugment)</text>
  <line x1="350" y1="322" x2="545" y2="322" stroke="#4a5160" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="650" y="354" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Logits</text>
  <line x1="550" y1="364" x2="745" y2="364" stroke="#4a5160" stroke-width="1.6" marker-end="url(#arr)"/>

  <polyline points="755,402 805,402 805,424 757,424" fill="none" stroke="#4a5160" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="812" y="408" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160">CrossEntropy loss</text>

  <text x="650" y="454" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Backprop gradients · optimizer.step()</text>
  <line x1="745" y1="464" x2="555" y2="464" stroke="#4a5160" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arr)"/>

  <!-- after loop -->
  <text x="650" y="528" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Validation logits (held-out split)</text>
  <line x1="550" y1="538" x2="945" y2="538" stroke="#4a5160" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="950" y="574" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Compute EER · F1 · accuracy</text>
  <polyline points="945,586 1000,586 1000,606 947,606" fill="none" stroke="#4a5160" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="550" y="638" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="12.5" fill="#4a5160" text-anchor="middle">Save best checkpoint (min EER) + calibrated threshold</text>
  <line x1="945" y1="648" x2="555" y2="648" stroke="#4a5160" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arr)"/>
</svg>
